<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Title and description are set from data.js at load time. -->
  <title>Dante Martin</title>
  <meta name="description" content="Dante Martin - civil engineering student at Santa Rosa Junior College.">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23227c4b%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2260%22 fill=%22white%22>D</text></svg>">
  
  <!-- SEO & Open Graph Preview Tags -->
  <meta property="og:title" content="Dante Martin - Civil Engineering Portfolio">
  <meta property="og:description" content="Civil engineering student at Santa Rosa Junior College. Student projects, automation tools, and academic coursework.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dante-martin.com">

  <script>
    // Apply a saved theme choice before paint, to avoid a flash. No saved
    // value means follow the operating system (handled in CSS).
    (function () {
      var t = localStorage.getItem("theme");
      if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body>
  <!-- The page is rendered by the script below from the DATA object in
       data.js. To change content, edit data.js, NOT this file. Edit here only
       to change page STRUCTURE. -->
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content" id="content"></main>
    <footer id="footer"></footer>
  </div>

  <script src="data.js"></script>
  <script>
  /* ---------------------------------------------------------------------
     Renderer. Small on purpose. It turns the DATA object into HTML, builds
     the sidebar nav from whichever sections actually have content, and
     highlights the nav item for the section you are looking at.
     Helpers: el(tag, class, html) and esc(text). A missing/empty field is
     skipped, so a half-filled entry never breaks the page.
     --------------------------------------------------------------------- */

  const escapeHtml = (unsafeString) => String(unsafeString == null ? "" : unsafeString)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  function createHtmlElement(tagName, className, innerHtml) {
    const htmlElementNode = document.createElement(tagName);
    if (className) htmlElementNode.className = className;
    if (innerHtml != null) htmlElementNode.innerHTML = innerHtml;
    return htmlElementNode;
  }

  function createAnchorElement(hyperlinkReference, linkText, renderingOptions) {
    const anchorElement = createHtmlElement("a", null, escapeHtml(linkText));
    anchorElement.href = hyperlinkReference;
    if (/^https?:/.test(hyperlinkReference)) { 
      anchorElement.target = "_blank"; 
      anchorElement.rel = "noopener noreferrer"; 
    }
    if (renderingOptions && renderingOptions.className) {
      anchorElement.className = renderingOptions.className;
    }
    return anchorElement;
  }

  // One project/experience entry.
  function createPortfolioEntryElement(portfolioEntry) {
    const entryContainerElement = createHtmlElement("article", "entry");
    if (portfolioEntry.title) {
      const headingElement = createHtmlElement("h3", null, escapeHtml(portfolioEntry.title));
      if (portfolioEntry.subtitle) {
        headingElement.appendChild(createHtmlElement("span", "subtitle", escapeHtml(portfolioEntry.subtitle)));
      }
      entryContainerElement.appendChild(headingElement);
    }
    const metadataSegments = [portfolioEntry.org, portfolioEntry.dates].filter(Boolean).map(escapeHtml);
    if (metadataSegments.length) {
      entryContainerElement.appendChild(createHtmlElement("div", "meta", metadataSegments.join(" · ")));
    }
    if (portfolioEntry.body) {
      entryContainerElement.appendChild(createHtmlElement("p", null, escapeHtml(portfolioEntry.body)));
    }
    if (portfolioEntry.link && portfolioEntry.link.href && portfolioEntry.link.label) {
      const moreLinkContainer = createHtmlElement("div", "more");
      moreLinkContainer.appendChild(createAnchorElement(portfolioEntry.link.href, portfolioEntry.link.label));
      entryContainerElement.appendChild(moreLinkContainer);
    }
    return entryContainerElement;
  }

  function renderPortfolio(portfolioData) {
    document.title = portfolioData.name;

    const sidebarElement = document.getElementById("sidebar");
    const contentElement = document.getElementById("content");
    const navigationTargetSections = []; // {id, label} for the in-page nav

    /* ---- Build content sections first, collecting nav targets. -------- */

    // Helper: start a <section id> and register it in the nav.
    function openSection(sectionId, navigationLabel) {
      const sectionElement = createHtmlElement("section");
      sectionElement.id = sectionId;
      navigationTargetSections.push({ id: sectionId, label: navigationLabel });
      return sectionElement;
    }

    // Intro paragraph (not a nav target).
    if (portfolioData.intro) {
      contentElement.appendChild(createHtmlElement("p", "intro", escapeHtml(portfolioData.intro)));
    }

    // Projects
    if (portfolioData.projects && portfolioData.projects.length) {
      const sectionElement = openSection("projects", "Projects");
      sectionElement.appendChild(createHtmlElement("h2", null, "Projects"));
      portfolioData.projects.forEach((projectEntry) => {
        sectionElement.appendChild(createPortfolioEntryElement(projectEntry));
      });
      const galleryLinkWrapper = createHtmlElement("div", "more gallery-link");
      galleryLinkWrapper.appendChild(createAnchorElement("projects/", "View Projects with Photos →"));
      sectionElement.appendChild(galleryLinkWrapper);
      contentElement.appendChild(sectionElement);
    }

    // Experience
    if (portfolioData.experience && portfolioData.experience.length) {
      const sectionElement = openSection("experience", "Experience");
      sectionElement.appendChild(createHtmlElement("h2", null, "Experience"));
      portfolioData.experience.forEach((experienceEntry) => {
        sectionElement.appendChild(createPortfolioEntryElement(experienceEntry));
      });
      contentElement.appendChild(sectionElement);
    }

    // Education
    if (portfolioData.education && portfolioData.education.school) {
      const educationSectionData = portfolioData.education;
      const educationSectionElement = openSection("education", "Education");
      educationSectionElement.className = "edu";
      educationSectionElement.appendChild(createHtmlElement("h2", null, "Education"));
      educationSectionElement.appendChild(createHtmlElement("h3", null, escapeHtml(educationSectionData.school)));
      if (educationSectionData.detail) {
        educationSectionElement.appendChild(createHtmlElement("p", null, escapeHtml(educationSectionData.detail)));
      }
      if (educationSectionData.coursework && educationSectionData.coursework.length) {
        const courseworkTableElement = createHtmlElement("table", "coursework");
        educationSectionData.coursework.forEach((courseworkRowData) => {
          const tableRowElement = createHtmlElement("tr");
          tableRowElement.appendChild(createHtmlElement("th", null, escapeHtml(courseworkRowData.term)));
          tableRowElement.appendChild(createHtmlElement("td", null, escapeHtml(courseworkRowData.courses)));
          courseworkTableElement.appendChild(tableRowElement);
        });
        educationSectionElement.appendChild(courseworkTableElement);
      }
      contentElement.appendChild(educationSectionElement);
    }

    // Honors
    if (portfolioData.honors && portfolioData.honors.length) {
      const honorsSectionElement = openSection("honors", "Honors");
      honorsSectionElement.appendChild(createHtmlElement("h2", null, "Honors"));
      const honorsUnorderedListElement = createHtmlElement("ul", "plainlist");
      portfolioData.honors.forEach((honorTextLine) => {
        honorsUnorderedListElement.appendChild(createHtmlElement("li", null, escapeHtml(honorTextLine)));
      });
      honorsSectionElement.appendChild(honorsUnorderedListElement);
      contentElement.appendChild(honorsSectionElement);
    }

    // Skills
    if (portfolioData.skills) {
      const skillsSectionElement = openSection("skills", "Skills");
      skillsSectionElement.appendChild(createHtmlElement("h2", null, "Skills"));
      [
        ["Working with", portfolioData.skills.working, "working"], 
        ["Learning", portfolioData.skills.learning, "learning"]
      ].forEach(([groupLabel, skillItems, skillCategoryKey]) => {
        if (!skillItems || !skillItems.length) return;
        const skillsetGroupElement = createHtmlElement("div", "skillset");
        skillsetGroupElement.appendChild(createHtmlElement("div", "label", escapeHtml(groupLabel)));
        const skillsListElement = createHtmlElement("div", "skills-list");
        skillItems.forEach((skillName) => {
          skillsListElement.appendChild(createHtmlElement("span", "skill-tag " + skillCategoryKey, escapeHtml(skillName)));
        });
        skillsetGroupElement.appendChild(skillsListElement);
        skillsSectionElement.appendChild(skillsetGroupElement);
      });
      contentElement.appendChild(skillsSectionElement);
    }

    /* ---- Sidebar: identity, nav (from collected targets), contact. ---- */
    sidebarElement.appendChild(createHtmlElement("h1", null, escapeHtml(portfolioData.name)));
    if (portfolioData.tagline) {
      sidebarElement.appendChild(createHtmlElement("p", "tagline", escapeHtml(portfolioData.tagline)));
    }
    if (portfolioData.location) {
      sidebarElement.appendChild(createHtmlElement("p", "location", escapeHtml(portfolioData.location)));
    }

    if (navigationTargetSections.length) {
      const navigationElement = createHtmlElement("nav", "nav");
      navigationTargetSections.forEach((navigationTarget) => {
        navigationElement.appendChild(createAnchorElement("#" + navigationTarget.id, navigationTarget.label));
      });
      sidebarElement.appendChild(navigationElement);
    }

    if (portfolioData.links && portfolioData.links.length) {
      const contactInfoContainer = createHtmlElement("div", "contact");
      portfolioData.links.forEach((linkData) => {
        if (linkData.href && linkData.label) {
          contactInfoContainer.appendChild(createAnchorElement(linkData.href, linkData.label));
        }
      });
      sidebarElement.appendChild(contactInfoContainer);
    }

    // Theme toggle. Pinned to the top-right of the viewport (see CSS); it
    // defaults to the OS setting, and clicking remembers an explicit choice.
    createThemeToggleButton(document.body);

    /* Footer */
    const currentCalendarYear = new Date().getFullYear();
    document.getElementById("footer").appendChild(
      createHtmlElement("p", null, "© " + currentCalendarYear + " " + escapeHtml(portfolioData.name)));

    /* ---- Scroll-spy: highlight the nav item for the visible section. -- */
    setupNavigationScrollSpy(navigationTargetSections);
  }

  // Current theme: an explicit choice if set, otherwise the OS preference.
  function determineEffectiveTheme() {
    const explicitlySavedTheme = document.documentElement.getAttribute("data-theme");
    if (explicitlySavedTheme) return explicitlySavedTheme;
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
      ? "dark" : "light";
  }

  function createThemeToggleButton(toggleContainerElement) {
    const themeToggleButton = createHtmlElement("button", "theme-toggle");
    themeToggleButton.type = "button";
    const updateToggleButtonLabelAndTitle = () => {
      const isCurrentThemeDark = determineEffectiveTheme() === "dark";
      themeToggleButton.textContent = isCurrentThemeDark ? "\u263C" : "\u263E"; // ☼ and ☾
      const upcomingTheme = isCurrentThemeDark ? "light" : "dark";
      themeToggleButton.setAttribute("aria-label", "Switch to " + upcomingTheme + " theme");
      themeToggleButton.title = "Switch to " + upcomingTheme + " theme";
    };
    updateToggleButtonLabelAndTitle();
    themeToggleButton.addEventListener("click", () => {
      const selectedNextTheme = determineEffectiveTheme() === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", selectedNextTheme);
      localStorage.setItem("theme", selectedNextTheme);
      updateToggleButtonLabelAndTitle();
    });
    if (window.matchMedia) {
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
        if (!localStorage.getItem("theme")) {
          updateToggleButtonLabelAndTitle();
        }
      });
    }
    toggleContainerElement.appendChild(themeToggleButton);
  }

  function setupNavigationScrollSpy(spyTargetSections) {
    if (!("IntersectionObserver" in window) || !spyTargetSections.length) return;
    const navigationAnchorLinksMap = {};
    document.querySelectorAll(".nav a").forEach((anchorLinkElement) => {
      navigationAnchorLinksMap[anchorLinkElement.getAttribute("href").slice(1)] = anchorLinkElement;
    });
    const scrollSpyIntersectionObserver = new IntersectionObserver((observerIntersectionEntries) => {
      observerIntersectionEntries.forEach((observerIntersectionEntry) => {
        if (observerIntersectionEntry.isIntersecting) {
          Object.values(navigationAnchorLinksMap).forEach((anchorLinkElement) => {
            anchorLinkElement.classList.remove("active");
          });
          const correspondingNavLink = navigationAnchorLinksMap[observerIntersectionEntry.target.id];
          if (correspondingNavLink) correspondingNavLink.classList.add("active");
        }
      });
    }, { rootMargin: "-20% 0px -70% 0px" });
    spyTargetSections.forEach((targetSection) => {
      const sectionElementToObserve = document.getElementById(targetSection.id);
      if (sectionElementToObserve) scrollSpyIntersectionObserver.observe(sectionElementToObserve);
    });
  }

  renderPortfolio(DATA);
  </script>
</body>
</html>
