<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Page title and description are set from data.js at load time. -->
  <title>Dante Martin</title>
  <meta name="description" content="Dante Martin — civil engineering student at Santa Rosa Junior College.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- The page is rendered by the script below from the DATA object in
       data.js. You should not need to edit this file to change content —
       edit data.js. Edit here only to change page STRUCTURE. -->
  <header id="header"></header>
  <main id="main"></main>
  <footer id="footer"></footer>

  <script src="data.js"></script>
  <script>
  /* ---------------------------------------------------------------------
     Renderer. Small on purpose. It turns the DATA object into HTML.
     Helpers:
       el(tag, className, html)  -> create an element
       esc(text)                 -> escape text so it is safe to insert
     Each section function appends to its container. A missing or empty
     field is simply skipped, so a half-filled entry never breaks the page.
     --------------------------------------------------------------------- */

  const esc = (s) => String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  function el(tag, className, html) {
    const node = document.createElement(tag);
    if (className) node.className = className;
    if (html != null) node.innerHTML = html;
    return node;
  }

  // Build an <a> from a {label, href} link object, or return null.
  function linkEl(link, className) {
    if (!link || !link.href || !link.label) return null;
    const a = el("a", null, esc(link.label));
    a.href = link.href;
    if (/^https?:/.test(link.href)) { a.target = "_blank"; a.rel = "noopener"; }
    const wrap = el("span", className);
    wrap.appendChild(a);
    return wrap;
  }

  // One project/experience entry.
  function entryEl(item) {
    const wrap = el("article", "entry");
    if (item.title) wrap.appendChild(el("h3", null, esc(item.title)));
    const metaBits = [item.org, item.dates].filter(Boolean).map(esc);
    if (metaBits.length) wrap.appendChild(el("div", "meta", metaBits.join(" · ")));
    if (item.body) wrap.appendChild(el("p", null, esc(item.body)));
    const more = linkEl(item.link, "more");
    if (more) wrap.appendChild(more);
    return wrap;
  }

  // A titled section wrapping a list of entries; skipped if the list is empty.
  function entrySection(title, items) {
    if (!items || !items.length) return null;
    const sec = el("section");
    sec.appendChild(el("h2", null, esc(title)));
    items.forEach((it) => sec.appendChild(entryEl(it)));
    return sec;
  }

  function render(data) {
    document.title = data.name;

    /* Header */
    const h = document.getElementById("header");
    h.appendChild(el("h1", null, esc(data.name)));
    if (data.tagline)  h.appendChild(el("p", "tagline", esc(data.tagline)));
    if (data.location) h.appendChild(el("p", "location", esc(data.location)));
    if (data.intro)    h.appendChild(el("p", "intro", esc(data.intro)));
    if (data.links && data.links.length) {
      const links = el("nav", "links");
      data.links.forEach((l) => {
        if (!l.href || !l.label) return;
        const a = el("a", null, esc(l.label));
        a.href = l.href;
        if (/^https?:/.test(l.href)) { a.target = "_blank"; a.rel = "noopener"; }
        links.appendChild(a);
      });
      h.appendChild(links);
    }

    /* Main sections, in display order. */
    const main = document.getElementById("main");
    const append = (node) => { if (node) main.appendChild(node); };

    append(entrySection("Projects", data.projects));
    append(entrySection("Experience", data.experience));

    /* Education */
    if (data.education && data.education.school) {
      const edu = data.education;
      const sec = el("section", "edu");
      sec.appendChild(el("h2", null, "Education"));
      sec.appendChild(el("h3", null, esc(edu.school)));
      if (edu.detail) sec.appendChild(el("p", null, esc(edu.detail)));
      if (edu.coursework && edu.coursework.length) {
        const table = el("table", "coursework");
        edu.coursework.forEach((row) => {
          const tr = el("tr");
          tr.appendChild(el("th", null, esc(row.term)));
          tr.appendChild(el("td", null, esc(row.courses)));
          table.appendChild(tr);
        });
        sec.appendChild(table);
      }
      main.appendChild(sec);
    }

    /* Honors */
    if (data.honors && data.honors.length) {
      const sec = el("section");
      sec.appendChild(el("h2", null, "Honors"));
      const ul = el("ul", "plainlist");
      data.honors.forEach((line) => ul.appendChild(el("li", null, esc(line))));
      sec.appendChild(ul);
      main.appendChild(sec);
    }

    /* Skills */
    if (data.skills) {
      const sec = el("section");
      sec.appendChild(el("h2", null, "Skills"));
      const groups = [
        ["Working with", data.skills.working],
        ["Learning",     data.skills.learning],
      ];
      groups.forEach(([label, items]) => {
        if (!items || !items.length) return;
        const g = el("div", "skillset");
        g.appendChild(el("div", "label", esc(label)));
        g.appendChild(el("div", "items", esc(items.join(", "))));
        sec.appendChild(g);
      });
      main.appendChild(sec);
    }

    /* Footer */
    const year = new Date().getFullYear();
    document.getElementById("footer").appendChild(
      el("p", null, "© " + year + " " + esc(data.name)));
  }

  render(DATA);
  </script>
</body>
</html>
