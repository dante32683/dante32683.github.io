<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dante Martin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    p  { margin-top: 0.75rem; color: #888; line-height: 1.6; }
    .links {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      color: #e5e5e5;
      text-decoration: none;
      border: 1px solid #333;
      padding: 0.5rem 1.1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: border-color 0.15s;
    }
    a:hover { border-color: #888; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Dante Martin</h1>
    <p>Portfolio &amp; homelab notes — coming soon.</p>
    <div class="links">
      <a href="https://github.com/dante32683" target="_blank" rel="noopener">GitHub</a>
    </div>
  </div>
</body>
</html>
