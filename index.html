<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Title and description are set from data.js at load time. -->
  <title>Dante Martin</title>
  <meta name="description" content="Dante Martin - civil engineering student at Santa Rosa Junior College.">
  <link rel="stylesheet" href="styles.css">
  <script>
    // Apply a saved theme choice before paint, to avoid a flash. No saved
    // value means follow the operating system (handled in CSS).
    (function () {
      var t = localStorage.getItem("theme");
      if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body>
  <!-- The page is rendered by the script below from the DATA object in
       data.js. To change content, edit data.js, NOT this file. Edit here only
       to change page STRUCTURE. -->
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content" id="content"></main>
    <footer id="footer"></footer>
  </div>

  <script src="data.js"></script>
  <script>
  /* ---------------------------------------------------------------------
     Renderer. Small on purpose. It turns the DATA object into HTML, builds
     the sidebar nav from whichever sections actually have content, and
     highlights the nav item for the section you are looking at.
     Helpers: el(tag, class, html) and esc(text). A missing/empty field is
     skipped, so a half-filled entry never breaks the page.
     --------------------------------------------------------------------- */

  const esc = (s) => String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  function el(tag, className, html) {
    const node = document.createElement(tag);
    if (className) node.className = className;
    if (html != null) node.innerHTML = html;
    return node;
  }

  function anchor(href, text, opts) {
    const a = el("a", null, esc(text));
    a.href = href;
    if (/^https?:/.test(href)) { a.target = "_blank"; a.rel = "noopener"; }
    if (opts && opts.className) a.className = opts.className;
    return a;
  }

  // One project/experience entry.
  function entryEl(item) {
    const wrap = el("article", "entry");
    if (item.title) {
      const h = el("h3", null, esc(item.title));
      if (item.subtitle) h.appendChild(el("span", "subtitle", esc(item.subtitle)));
      wrap.appendChild(h);
    }
    const metaBits = [item.org, item.dates].filter(Boolean).map(esc);
    if (metaBits.length) wrap.appendChild(el("div", "meta", metaBits.join(" · ")));
    if (item.body) wrap.appendChild(el("p", null, esc(item.body)));
    if (item.link && item.link.href && item.link.label) {
      const more = el("div", "more");
      more.appendChild(anchor(item.link.href, item.link.label));
      wrap.appendChild(more);
    }
    return wrap;
  }

  function render(data) {
    document.title = data.name;

    const sidebar = document.getElementById("sidebar");
    const content = document.getElementById("content");
    const navTargets = []; // {id, label} for the in-page nav

    /* ---- Build content sections first, collecting nav targets. -------- */

    // Helper: start a <section id> and register it in the nav.
    function openSection(id, navLabel) {
      const sec = el("section");
      sec.id = id;
      navTargets.push({ id: id, label: navLabel });
      return sec;
    }

    // Intro paragraph (not a nav target).
    if (data.intro) content.appendChild(el("p", "intro", esc(data.intro)));

    // Projects
    if (data.projects && data.projects.length) {
      const sec = openSection("projects", "Projects");
      sec.appendChild(el("h2", null, "Projects"));
      data.projects.forEach((p) => sec.appendChild(entryEl(p)));
      content.appendChild(sec);
    }

    // Experience
    if (data.experience && data.experience.length) {
      const sec = openSection("experience", "Experience");
      sec.appendChild(el("h2", null, "Experience"));
      data.experience.forEach((p) => sec.appendChild(entryEl(p)));
      content.appendChild(sec);
    }

    // Education
    if (data.education && data.education.school) {
      const edu = data.education;
      const sec = openSection("education", "Education");
      sec.className = "edu";
      sec.appendChild(el("h2", null, "Education"));
      sec.appendChild(el("h3", null, esc(edu.school)));
      if (edu.detail) sec.appendChild(el("p", null, esc(edu.detail)));
      if (edu.coursework && edu.coursework.length) {
        const table = el("table", "coursework");
        edu.coursework.forEach((row) => {
          const tr = el("tr");
          tr.appendChild(el("th", null, esc(row.term)));
          tr.appendChild(el("td", null, esc(row.courses)));
          table.appendChild(tr);
        });
        sec.appendChild(table);
      }
      content.appendChild(sec);
    }

    // Honors
    if (data.honors && data.honors.length) {
      const sec = openSection("honors", "Honors");
      sec.appendChild(el("h2", null, "Honors"));
      const ul = el("ul", "plainlist");
      data.honors.forEach((line) => ul.appendChild(el("li", null, esc(line))));
      sec.appendChild(ul);
      content.appendChild(sec);
    }

    // Skills
    if (data.skills) {
      const sec = openSection("skills", "Skills");
      sec.appendChild(el("h2", null, "Skills"));
      [["Working with", data.skills.working], ["Learning", data.skills.learning]]
        .forEach(([label, items]) => {
          if (!items || !items.length) return;
          const g = el("div", "skillset");
          g.appendChild(el("div", "label", esc(label)));
          g.appendChild(el("div", "items", esc(items.join(", "))));
          sec.appendChild(g);
        });
      content.appendChild(sec);
    }

    /* ---- Sidebar: identity, nav (from collected targets), contact. ---- */
    sidebar.appendChild(el("h1", null, esc(data.name)));
    if (data.tagline)  sidebar.appendChild(el("p", "tagline", esc(data.tagline)));
    if (data.location) sidebar.appendChild(el("p", "location", esc(data.location)));

    if (navTargets.length) {
      const nav = el("nav", "nav");
      navTargets.forEach((t) => nav.appendChild(anchor("#" + t.id, t.label)));
      sidebar.appendChild(nav);
    }

    if (data.links && data.links.length) {
      const contact = el("div", "contact");
      data.links.forEach((l) => {
        if (l.href && l.label) contact.appendChild(anchor(l.href, l.label));
      });
      sidebar.appendChild(contact);
    }

    // Theme toggle. Defaults to the OS setting; clicking sets an explicit
    // choice and remembers it. The label names what the click will do.
    buildThemeToggle(sidebar);

    /* Footer */
    const year = new Date().getFullYear();
    document.getElementById("footer").appendChild(
      el("p", null, "© " + year + " " + esc(data.name)));

    /* ---- Scroll-spy: highlight the nav item for the visible section. -- */
    setupScrollSpy(navTargets);
  }

  // Current theme: an explicit choice if set, otherwise the OS preference.
  function effectiveTheme() {
    const explicit = document.documentElement.getAttribute("data-theme");
    if (explicit) return explicit;
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
      ? "dark" : "light";
  }

  function buildThemeToggle(sidebar) {
    const btn = el("button", "theme-toggle");
    btn.type = "button";
    const relabel = () => {
      btn.textContent = effectiveTheme() === "dark" ? "Use light theme" : "Use dark theme";
    };
    relabel();
    btn.addEventListener("click", () => {
      const next = effectiveTheme() === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
      relabel();
    });
    sidebar.appendChild(btn);
  }

  function setupScrollSpy(targets) {
    if (!("IntersectionObserver" in window) || !targets.length) return;
    const links = {};
    document.querySelectorAll(".nav a").forEach((a) => {
      links[a.getAttribute("href").slice(1)] = a;
    });
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          Object.values(links).forEach((a) => a.classList.remove("active"));
          const link = links[entry.target.id];
          if (link) link.classList.add("active");
        }
      });
    }, { rootMargin: "-20% 0px -70% 0px" });
    targets.forEach((t) => {
      const sec = document.getElementById(t.id);
      if (sec) obs.observe(sec);
    });
  }

  render(DATA);
  </script>
</body>
</html>
