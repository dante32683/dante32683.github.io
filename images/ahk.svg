<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#17191c" rx="8"/>
  <defs>
    <linearGradient id="ahkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#227c4b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#52b788" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <!-- Flow diagram for hotkeys -->
  <g transform="translate(100, 100)" stroke="#2c2f34" stroke-width="2" fill="none">
    <!-- Key CapsLock -->
    <rect x="20" y="80" width="120" height="70" rx="8" fill="#121316" stroke="#52b788" stroke-width="2"/>
    <text x="45" y="122" fill="#52b788" font-family="sans-serif" font-size="15" font-weight="bold" stroke="none">Caps Lock</text>
    <!-- Arrow -->
    <path d="M 140 115 L 220 115" stroke="#52b788" stroke-width="2" marker-end="url(#arrow)"/>
    <!-- Conditional layer -->
    <rect x="220" y="50" width="160" height="130" rx="8" fill="#121316" stroke="#2c2f34"/>
    <text x="250" y="90" fill="#e8e9ea" font-family="sans-serif" font-size="13" stroke="none">Active Layer</text>
    <text x="250" y="120" fill="#9aa0a6" font-family="sans-serif" font-size="11" stroke="none">IJK -> Up/Left/Down</text>
    <text x="250" y="145" fill="#9aa0a6" font-family="sans-serif" font-size="11" stroke="none">H/L -> Back/Del</text>
    <!-- Arrow Out -->
    <path d="M 380 115 L 460 115" stroke="#52b788" stroke-width="2"/>
    <!-- Action box -->
    <rect x="460" y="80" width="120" height="70" rx="8" fill="url(#ahkGrad)" stroke="#52b788" stroke-width="1.5"/>
    <text x="495" y="122" fill="#e8e9ea" font-family="sans-serif" font-size="14" font-weight="bold" stroke="none">Navigation</text>
  </g>
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52b788"/>
    </marker>
  </defs>
  <text x="30" y="50" fill="#e8e9ea" font-family="sans-serif" font-size="18" font-weight="bold" letter-spacing="1">AUTOHOTKEY: DESKTOP AUTOMATION</text>
  <text x="30" y="75" fill="#9aa0a6" font-family="sans-serif" font-size="12">CAPSLOCK MODIFIER LAYER | SYSTEM TRIGGERS &amp; ACTIONS</text>
</svg>
