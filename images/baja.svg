<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#17191c" rx="8"/>
  <defs>
    <linearGradient id="bajaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#227c4b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#52b788" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <!-- Grid lines -->
  <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200 M 0 250 L 800 250 M 0 300 L 800 300 M 0 350 L 800 350 M 0 400 L 800 400" stroke="#2c2f34" stroke-width="1"/>
  <path d="M 100 0 L 100 450 M 200 0 L 200 450 M 300 0 L 300 450 M 400 0 L 400 450 M 500 0 L 500 450 M 600 0 L 600 450 M 700 0 L 700 450" stroke="#2c2f34" stroke-width="1"/>
  <!-- Baja wireframe chassis -->
  <g stroke="#52b788" stroke-width="2" fill="none" opacity="0.85">
    <!-- Wheels -->
    <circle cx="250" cy="300" r="60" stroke-dasharray="4,4"/>
    <circle cx="250" cy="300" r="20"/>
    <circle cx="550" cy="300" r="60" stroke-dasharray="4,4"/>
    <circle cx="550" cy="300" r="20"/>
    <!-- Chassis frame rails -->
    <path d="M 200 300 L 300 300 L 360 220 L 500 220 L 580 300 L 620 300" />
    <path d="M 250 300 L 300 220 L 400 140 L 480 140 L 550 300" />
    <path d="M 300 220 L 500 220" fill="url(#bajaGrad)"/>
    <!-- Shock absorbers -->
    <path d="M 250 300 L 300 220 M 550 300 L 500 220" stroke-width="4" stroke="#5b6066"/>
    <!-- Bracing -->
    <line x1="360" y1="220" x2="400" y2="140" />
    <line x1="500" y1="220" x2="480" y2="140" />
    <line x1="300" y1="300" x2="360" y2="220" />
    <line x1="550" y1="300" x2="500" y2="220" />
  </g>
  <text x="30" y="50" fill="#e8e9ea" font-family="sans-serif" font-size="18" font-weight="bold" letter-spacing="1">BAJA SAE: OPTIMIZATION &amp; FEA</text>
  <text x="30" y="75" fill="#9aa0a6" font-family="sans-serif" font-size="12">CHASSIS WIREFRAME | STRESS DISTRIBUTION SIMULATION</text>
</svg>
