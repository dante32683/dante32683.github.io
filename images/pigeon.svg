<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#17191c" rx="8"/>
  <defs>
    <linearGradient id="pigeonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#227c4b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#52b788" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Grid lines for engineering feel -->
  <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200 M 0 250 L 800 250 M 0 300 L 800 300 M 0 350 L 800 350 M 0 400 L 800 400" stroke="#2c2f34" stroke-width="1"/>
  <path d="M 100 0 L 100 450 M 200 0 L 200 450 M 300 0 L 300 450 M 400 0 L 400 450 M 500 0 L 500 450 M 600 0 L 600 450 M 700 0 L 700 450" stroke="#2c2f34" stroke-width="1"/>
  <!-- UAV schematic sketch -->
  <g stroke="#52b788" stroke-width="2" fill="none" opacity="0.85">
    <!-- Wings -->
    <path d="M 150 225 L 350 215 L 400 220 L 450 215 L 650 225 L 640 240 L 400 235 L 160 240 Z" fill="url(#pigeonGrad)"/>
    <!-- Fuselage -->
    <path d="M 380 140 Q 400 100 420 140 L 415 320 Q 400 350 385 320 Z"/>
    <!-- V-tail -->
    <path d="M 390 310 L 340 350 L 350 360 L 400 325 L 450 360 L 460 350 L 410 310"/>
    <!-- Propeller -->
    <ellipse cx="400" cy="115" rx="50" ry="10" stroke="#5b6066" stroke-dasharray="5,5"/>
    <circle cx="400" cy="115" r="4" fill="#52b788"/>
  </g>
  <text x="30" y="50" fill="#e8e9ea" font-family="sans-serif" font-size="18" font-weight="bold" letter-spacing="1">PROJECT PIGEON: UAV SCHEMATIC</text>
  <text x="30" y="75" fill="#9aa0a6" font-family="sans-serif" font-size="12">WINGSPAN: 1.5m | AIRFOIL: NACA 4412 | V-TAIL CONFIG</text>
</svg>
