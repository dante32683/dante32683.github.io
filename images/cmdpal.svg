<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#17191c" rx="8"/>
  <!-- UI Mockup -->
  <g transform="translate(100, 75)" opacity="0.9">
    <!-- Window shadow / borders -->
    <rect width="600" height="300" rx="8" fill="#121316" stroke="#2c2f34" stroke-width="2"/>
    <!-- Command Palette input -->
    <rect x="20" y="20" width="560" height="40" rx="6" fill="#1e2024" stroke="#52b788" stroke-width="1.5"/>
    <text x="40" y="45" fill="#e8e9ea" font-family="monospace" font-size="14">PowerToys Run > CmdPal Suite</text>
    <line x1="280" y1="28" x2="280" y2="52" stroke="#52b788" stroke-width="2"/>
    <!-- Menu items -->
    <g transform="translate(20, 80)">
      <!-- Selected item -->
      <rect width="560" height="35" rx="4" fill="rgba(82, 183, 136, 0.1)" stroke="rgba(82, 183, 136, 0.3)"/>
      <text x="20" y="22" fill="#52b788" font-family="sans-serif" font-size="13" font-weight="bold">> Media Controller</text>
      <text x="480" y="22" fill="#9aa0a6" font-family="sans-serif" font-size="11">Active Playback</text>
    </g>
    <g transform="translate(20, 125)">
      <text x="20" y="22" fill="#e8e9ea" font-family="sans-serif" font-size="13">  Developer Toolbox</text>
      <text x="480" y="22" fill="#9aa0a6" font-family="sans-serif" font-size="11">Extension</text>
    </g>
    <g transform="translate(20, 170)">
      <text x="20" y="22" fill="#e8e9ea" font-family="sans-serif" font-size="13">  Quick Notes Logger</text>
      <text x="480" y="22" fill="#9aa0a6" font-family="sans-serif" font-size="11">Extension</text>
    </g>
    <g transform="translate(20, 215)">
      <text x="20" y="22" fill="#e8e9ea" font-family="sans-serif" font-size="13">  System Monitor Dashboard</text>
      <text x="480" y="22" fill="#9aa0a6" font-family="sans-serif" font-size="11">Extension</text>
    </g>
  </g>
  <text x="30" y="40" fill="#e8e9ea" font-family="sans-serif" font-size="14" font-weight="bold" letter-spacing="1">CMDPAL EXTENSION SUITE</text>
</svg>
